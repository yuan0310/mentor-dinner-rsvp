<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>導生宴 RSVP — 管理後台</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
</head>
<body class="admin-page">

  <div class="page">

    <!-- Nav -->
    <nav class="admin-nav">
      <a href="/">← 學生頁面</a>
      <button class="btn-refresh" id="btn-refresh" type="button">
        <span class="ri">↻</span> 重新整理
      </button>
    </nav>

    <!-- Hero -->
    <header class="hero">
      <div class="top-ornament">
        <span class="line"></span>
        <span class="diamond"></span>
        <span class="line"></span>
      </div>
      <p class="hero-eyebrow">Admin</p>
      <h1 class="hero-title">回覆總覽</h1>
      <p class="hero-subtitle">查看所有學生的出席回覆</p>
    </header>

    <!-- Summary -->
    <div class="summary-grid">
      <div class="summary-card">
        <div class="num" id="sum-total">0</div>
        <div class="label">已回覆</div>
      </div>
      <div class="summary-card">
        <div class="num" id="sum-yes">0</div>
        <div class="label">出席</div>
      </div>
      <div class="summary-card">
        <div class="num" id="sum-no">0</div>
        <div class="label">無法出席</div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-card">
      <div class="table-wrap">
        <table class="resp-table" id="resp-table">
          <thead>
            <tr>
              <th>#</th>
              <th>姓名</th>
              <th>學號</th>
              <th>出席</th>
              <th>備註</th>
              <th>時間</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="empty-state" id="empty" style="display:none;">
        <div class="empty-icon">—</div>
        <p>尚未收到任何回覆</p>
      </div>
    </div>

    <footer class="footer">
      <p>導生宴 RSVP 管理系統</p>
    </footer>

  </div>

  <script>
    const tbody = document.getElementById('tbody');
    const empty = document.getElementById('empty');
    const refreshBtn = document.getElementById('btn-refresh');

    async function load() {
      refreshBtn.classList.add('spinning');
      try {
        const res = await fetch('/api/responses');
        const d = await res.json();

        document.getElementById('sum-total').textContent = d.total;
        document.getElementById('sum-yes').textContent = d.attendingCount;
        document.getElementById('sum-no').textContent = d.notAttendingCount;

        if (!d.responses.length) {
          tbody.innerHTML = '';
          empty.style.display = 'block';
        } else {
          empty.style.display = 'none';
          tbody.innerHTML = d.responses.map((r, i) => {
            const t = new Date(r.submittedAt);
            const ts = `${t.getMonth()+1}/${t.getDate()} ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
            return `<tr>
              <td class="idx-cell">${i+1}</td>
              <td><strong>${esc(r.name)}</strong></td>
              <td style="color:var(--text-secondary)">${esc(r.studentId||'—')}</td>
              <td><span class="badge ${r.attending?'yes':'no'}">${r.attending?'✓ 出席':'✗ 不出席'}</span></td>
              <td class="notes-cell" title="${esc(r.dietaryNotes||'')}">${esc(r.dietaryNotes||'—')}</td>
              <td class="time-cell">${ts}</td>
              <td><button class="btn-del" onclick="del(${i})" title="刪除">✕</button></td>
            </tr>`;
          }).join('');
        }
      } catch (e) { console.error(e); }
      finally { setTimeout(() => refreshBtn.classList.remove('spinning'), 300); }
    }

    async function del(i) {
      if (!confirm('確定刪除？')) return;
      await fetch(`/api/responses/${i}`, { method: 'DELETE' });
      load();
    }

    function esc(s) {
      const el = document.createElement('div');
      el.textContent = s;
      return el.innerHTML;
    }

    refreshBtn.addEventListener('click', load);
    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
