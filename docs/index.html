<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="導生宴活動邀請 — 請回覆是否出席">
  <title>導生宴 RSVP</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%23c8a96a'>✦</text></svg>">
</head>
<body>

  <div class="page">

    <div class="top-ornament">
      <span class="line"></span>
      <span class="diamond"></span>
      <span class="line"></span>
    </div>

    <header class="hero">
      <p class="hero-eyebrow">Invitation</p>
      <h1 class="hero-title" id="hero-title">導生宴</h1>
      <p class="hero-subtitle" id="hero-subtitle"></p>
    </header>

    <div class="notice" id="notice-deadline">
      <span>回覆截止：<strong id="deadline-text">—</strong></span>
    </div>

    <div class="divider">
      <span class="line"></span>
      <span class="icon">✦</span>
      <span class="line"></span>
    </div>

    <section class="section">
      <p class="section-label">活動資訊</p>
      <div class="details" id="detail-list"></div>
    </section>

    <section class="section">
      <p class="section-label">距離活動</p>
      <div class="countdown">
        <div class="cd-unit"><span class="cd-num" id="cd-days">—</span><span class="cd-label">Days</span></div>
        <div class="cd-unit"><span class="cd-num" id="cd-hours">—</span><span class="cd-label">Hours</span></div>
        <div class="cd-unit"><span class="cd-num" id="cd-mins">—</span><span class="cd-label">Min</span></div>
        <div class="cd-unit"><span class="cd-num" id="cd-secs">—</span><span class="cd-label">Sec</span></div>
      </div>
    </section>

    <section class="section">
      <p class="section-label">回覆狀況</p>
      <div class="stats">
        <div class="stat"><span class="stat-num" id="stat-yes">0</span><span class="stat-label">出席</span></div>
        <div class="stat"><span class="stat-num" id="stat-no">0</span><span class="stat-label">無法出席</span></div>
        <div class="stat"><span class="stat-num" id="stat-total">0</span><span class="stat-label">已回覆</span></div>
      </div>
    </section>

    <div class="divider">
      <span class="line"></span>
      <span class="icon">✦</span>
      <span class="line"></span>
    </div>

    <section class="section">
      <p class="section-label">回覆出席</p>
      <div class="form-card">
        <form id="rsvp-form">
          <div class="form-group">
            <label class="form-label" for="input-name">姓名 <span class="req">*</span></label>
            <input type="text" id="input-name" class="form-input" placeholder="你的姓名" required autocomplete="name">
          </div>
          <div class="form-group">
            <label class="form-label" for="input-sid">學號</label>
            <input type="text" id="input-sid" class="form-input" placeholder="選填" autocomplete="off">
          </div>
          <div class="form-group">
            <label class="form-label">是否能參加？ <span class="req">*</span></label>
            <div class="rsvp-choice">
              <label class="choice">
                <input type="radio" name="attending" value="yes" required>
                <div class="choice-face"><span class="choice-symbol">○</span><span class="text">我要參加</span></div>
              </label>
              <label class="choice">
                <input type="radio" name="attending" value="no">
                <div class="choice-face"><span class="choice-symbol">×</span><span class="text">無法參加</span></div>
              </label>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="input-notes">備註 / 飲食禁忌</label>
            <textarea id="input-notes" class="form-input" placeholder="素食、過敏或其他備註…"></textarea>
          </div>
          <div class="hint" id="hint-box" style="display:none;"><span id="hint-text"></span></div>
          <button type="submit" class="btn-submit" id="btn-submit">
            <span class="btn-text">送出回覆</span>
            <span class="btn-loading"><span class="spinner"></span> 送出中…</span>
          </button>
        </form>
        <div class="result" id="result">
          <div class="result-symbol" id="result-symbol">✓</div>
          <div class="result-title" id="result-title">已收到回覆</div>
          <div class="result-desc" id="result-desc"></div>
          <button class="btn-ghost" id="btn-reset" type="button">← 修改回覆</button>
        </div>
      </div>
    </section>

    <footer class="footer">
      <p>有任何問題，請聯繫 <a href="#" id="contact-link">老師</a></p>
    </footer>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
