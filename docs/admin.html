<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>導生宴 RSVP — 管理後台</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%23c8a96a'>✦</text></svg>">
</head>
<body class="admin-page">

  <div class="page">
    <nav class="admin-nav">
      <a href="./">← 學生頁面</a>
      <div style="display: flex; gap: 12px; align-items: center;">
        <button id="btn-clear-all" type="button" style="background: transparent; border: 1px solid #fa5252; color: #fa5252; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.875rem; font-weight: 500; transition: all 0.2s ease;">
          🗑 清空全部資料
        </button>
        <button class="btn-refresh" id="btn-refresh" type="button">
          <span class="ri">↻</span> 重新整理
        </button>
      </div>
    </nav>

    <header class="hero">
      <div class="top-ornament">
        <span class="line"></span>
        <span class="diamond"></span>
        <span class="line"></span>
      </div>
      <p class="hero-eyebrow">Admin</p>
      <h1 class="hero-title">回覆總覽</h1>
      <p class="hero-subtitle">查看所有學生的出席回覆</p>
    </header>

    <div class="summary-grid">
      <div class="summary-card"><div class="num" id="sum-total">0</div><div class="label">已回覆</div></div>
      <div class="summary-card"><div class="num" id="sum-yes">0</div><div class="label">出席</div></div>
      <div class="summary-card"><div class="num" id="sum-no">0</div><div class="label">無法出席</div></div>
    </div>

    <div class="table-card">
      <div class="table-wrap">
        <table class="resp-table">
          <thead>
            <tr><th>#</th><th>姓名</th><th>學號</th><th>出席</th><th>備註</th><th>時間</th><th></th></tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="empty-state" id="empty" style="display:none;">
        <div class="empty-icon">—</div>
        <p>尚未收到任何回覆</p>
      </div>
    </div>

    <footer class="footer"><p>導生宴 RSVP 管理系統</p></footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const tbody = document.getElementById('tbody');
    const empty = document.getElementById('empty');
    const refreshBtn = document.getElementById('btn-refresh');
    const clearBtn = document.getElementById('btn-clear-all');

    async function load() {
      refreshBtn.classList.add('spinning');
      try {
        const { data, error } = await sb.from('responses').select('*').order('submitted_at', { ascending: true });
        if (error) throw error;

        const yes = data.filter(r => r.attending).length;
        const no  = data.filter(r => !r.attending).length;
        document.getElementById('sum-total').textContent = data.length;
        document.getElementById('sum-yes').textContent = yes;
        document.getElementById('sum-no').textContent = no;

        if (!data.length) {
          tbody.innerHTML = '';
          empty.style.display = 'block';
        } else {
          empty.style.display = 'none';
          tbody.innerHTML = data.map((r, i) => {
            const t = new Date(r.submitted_at);
            const ts = `${t.getMonth()+1}/${t.getDate()} ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
            return `<tr>
              <td class="idx-cell">${i+1}</td>
              <td><strong>${esc(r.name)}</strong></td>
              <td style="color:var(--text-secondary)">${esc(r.student_id||'—')}</td>
              <td><span class="badge ${r.attending?'yes':'no'}">${r.attending?'✓ 出席':'✗ 不出席'}</span></td>
              <td class="notes-cell" title="${esc(r.dietary_notes||'')}">${esc(r.dietary_notes||'—')}</td>
              <td class="time-cell">${ts}</td>
              <td><button class="btn-del" onclick="del(${r.id})" title="刪除">✕</button></td>
            </tr>`;
          }).join('');
        }
      } catch (e) { console.error(e); }
      finally { setTimeout(() => refreshBtn.classList.remove('spinning'), 300); }
    }

    async function del(id) {
      if (!confirm('確定刪除？')) return;
      await sb.from('responses').delete().eq('id', id);
      load();
    }

    async function clearAll() {
      const pin = prompt('⚠️ 警告：這將會永久刪除「所有學生」的回覆資料！\n\n為了避免誤按，請在下方輸入大寫的「DELETE」來確認刪除：');
      if (pin !== 'DELETE') {
        if (pin !== null) alert('輸入錯誤或已取消，資料未刪除。');
        return;
      }
      
      clearBtn.style.opacity = '0.5';
      clearBtn.textContent = '清空中...';
      try {
        const { error } = await sb.from('responses').delete().gt('id', 0);
        if (error) throw error;
        alert('✅ 所有資料已經成功清空！您可以開始準備下一場活動了。');
        load();
      } catch (e) {
        alert('清空失敗：' + e.message);
        console.error(e);
      } finally {
        clearBtn.style.opacity = '1';
        clearBtn.innerHTML = '🗑 清空全部資料';
      }
    }

    function esc(s) {
      const el = document.createElement('div');
      el.textContent = s;
      return el.innerHTML;
    }

    refreshBtn.addEventListener('click', load);
    clearBtn.addEventListener('click', clearAll);
    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
